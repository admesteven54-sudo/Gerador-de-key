<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel VIP</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,Arial}
  body{background:#0a0a0a;color:#fff;padding:20px}
  .card{background:#151515;border:1px solid #2a2a2a;padding:20px;border-radius:15px;max-width:500px;margin:20px auto}
  h1{color:#00ff88;text-align:center;margin-bottom:15px}
  input,select{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:#222;color:#fff;font-size:15px}
  button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:linear-gradient(90deg,#00ff88,#00cc6a);color:#000;font-weight:bold;font-size:15px;cursor:pointer}
  button.red{background:#ff4444;color:#fff}
  .key-box{background:#222;padding:12px;border-radius:10px;margin:10px 0;word-break:break-all;border:1px solid #333}
  .banida{border-color:#ff4444;background:#2a1111}
  #login{display:block} #painel{display:none}
  .info{font-size:12px;color:#aaa}
</style>
</head>
<body>

<div class="card" id="login">
  <h1>🔒 PAINEL ADMIN</h1>
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="entrar()">ENTRAR</button>
  <p id="erro" style="color:#ff4444;display:none;text-align:center">Senha errada!</p>
</div>

<div class="card" id="painel">
  <h1>⚡ GERADOR VIP</h1>
  
  <label>Tempo da Key:</label>
  <select id="tempo">
    <option value="1h">1 Hora</option>
    <option value="1d">1 Dia</option>
    <option value="30d">30 Dias</option>
    <option value="perm">Permanente</option>
  </select>
  
  <button onclick="gerarKey()">GERAR NOVA KEY</button>
  
  <div id="resultado" style="display:none;">
    <div class="key-box" id="key"></div>
    <button onclick="copiar()">📋 COPIAR</button>
    <p class="info" id="infoKey"></p>
  </div>

  <hr style="margin:20px 0;border-color:#333">
  
  <h1>🚫 BANIR KEY</h1>
  <input type="text" id="banInput" placeholder="Cole a key aqui para banir">
  <button class="red" onclick="banirKey()">BANIR KEY</button>
  
  <h3 style="margin-top:15px;">Keys Banidas:</h3>
  <div id="listaBan"></div>
</div>

<script>
const SENHA = "marcoskey444";
let keysBanidas = JSON.parse(localStorage.getItem("banidas")) || [];

function entrar(){
  if(document.getElementById("senha").value == SENHA){
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
    mostrarBanidas();
  }else{
    document.getElementById("erro").style.display = "block";
  }
}

function gerarKey(){
  let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let key = "VIP-";
  for(let i=0; i<16; i++){
    key += chars.charAt(Math.floor(Math.random() * chars.length));
    if((i+1)%4==0 && i!=15) key += "-";
  }
  
  let tempo = document.getElementById("tempo").value;
  let expira = "";
  if(tempo == "1h") expira = "Expira em 1 Hora";
  if(tempo == "1d") expira = "Expira em 1 Dia";
  if(tempo == "30d") expira = "Expira em 30 Dias";
  if(tempo == "perm") expira = "Permanente";
  
  document.getElementById("key").innerText = key + "|" + tempo;
  document.getElementById("infoKey").innerText = expira;
  document.getElementById("resultado").style.display = "block";
}

function copiar(){
  navigator.clipboard.writeText(document.getElementById("key").innerText);
  alert("Key copiada!");
}

function banirKey(){
  let k = document.getElementById("banInput").value.trim();
  if(k && !keysBanidas.includes(k)){
    keysBanidas.push(k);
    localStorage.setItem("banidas", JSON.stringify(keysBanidas));
    document.getElementById("banInput").value = "";
    mostrarBanidas();
  }
}

function mostrarBanidas(){
  let div = document.getElementById("listaBan");
  div.innerHTML = "";
  keysBanidas.forEach(k => {
    div.innerHTML += `<div class="key-box banida">${k} <button class="red" style="width:auto;padding:5px 10px;float:right" onclick="desbanir('${k}')">Desbanir</button></div>`;
  });
}

function desbanir(k){
  keysBanidas = keysBanidas.filter(x => x != k);
  localStorage.setItem("banidas", JSON.stringify(keysBanidas));
  mostrarBanidas();
}
</script>

</body>
 </html>
